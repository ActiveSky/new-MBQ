# model args
model: internvl2
model_args: pretrained=OpenGVLab/InternVL2-2B

# task args
tasks: docvqa_val 
batch_size: 1
log_samples: True
log_samples_suffix: docvqa_val 

# quantization config
method: mbq
run_process: False # You don't need to run scale search, load the scale directly
pseudo_quant: True # if True, conduct pseudo quantization on the model, otherwise the model will stay in fp16
scale_path: scale_cache/mbq/internvl2_2b_w3g128.pt
w_bit: 3
w_group: 128

# output args
output_path: outputs/my-internvl2-2b/

